<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SBL Dam stats</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: #0f1115; color: #e8e8e8;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  line-height: 1.5;
}
a { color: #6cb6ff; text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }

header.site {
  border-bottom: 1px solid #2a2f3a;
  padding: 14px 24px;
  background: #161a22;
  position: sticky; top: 0; z-index: 10;
}
header.site .row { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
header.site h1 { font-size: 18px; margin: 0; font-weight: 600; }
header.site h1 a { color: inherit; cursor: pointer; }
header.site .search { flex: 1; position: relative; }
header.site input[type=text] {
  width: 100%; padding: 10px 14px; border-radius: 8px;
  background: #0f1115; border: 1px solid #2a2f3a; color: inherit; font-size: 16px;
}
header.site input[type=text]:focus { outline: none; border-color: #6cb6ff; }

.section { margin-top: 28px; }
.section h2 {
  font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em;
  color: #9aa3b2; margin: 0 0 10px; font-weight: 600;
}
.card { background: #161a22; border: 1px solid #2a2f3a; border-radius: 10px; padding: 16px; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px 10px; text-align: right; font-variant-numeric: tabular-nums; }
th:first-child, td:first-child { text-align: left; }
th {
  color: #9aa3b2; font-weight: 600; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid #2a2f3a;
}
tr.match td { border-bottom: 1px solid #1f2530; }
tr.match:hover td { background: #1a1f2a; }

.player-grid { display: grid; grid-template-columns: 100px 1fr; gap: 18px; align-items: center; }
.player-grid .photo { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; background: #2a2f3a; }
.player-name { font-size: 28px; font-weight: 700; line-height: 1.1; }
.player-meta { color: #9aa3b2; margin-top: 4px; font-size: 14px; }

.compare { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 8px; }
.compare .stat {
  background: #0f1115; border: 1px solid #2a2f3a; border-radius: 8px;
  padding: 10px; text-align: center;
}
.compare .stat .label { font-size: 11px; color: #9aa3b2; text-transform: uppercase; letter-spacing: 0.06em; }
.compare .stat .val { font-size: 22px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
.compare .stat .delta { font-size: 12px; margin-top: 2px; }
.compare .stat .delta.up { color: #6fd28e; }
.compare .stat .delta.down { color: #ff8b8b; }
.compare .stat .delta.zero { color: #9aa3b2; }

.results { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; margin-top: 12px; }
.result {
  display: flex; gap: 12px; align-items: center;
  background: #161a22; border: 1px solid #2a2f3a; border-radius: 10px;
  padding: 12px; text-decoration: none; color: inherit; cursor: pointer;
  transition: border-color 0.1s ease;
}
.result:hover { border-color: #6cb6ff; text-decoration: none; }
.result .photo { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #2a2f3a; flex-shrink: 0; }
.result .name { font-weight: 600; }
.result .meta { font-size: 13px; color: #9aa3b2; }

.muted { color: #9aa3b2; }
.empty { padding: 40px 20px; text-align: center; color: #9aa3b2; }
.loading { padding: 80px 20px; text-align: center; color: #9aa3b2; font-size: 14px; }

footer.site {
  margin-top: 60px; padding: 24px; text-align: center;
  color: #5a6478; font-size: 13px; border-top: 1px solid #2a2f3a;
}
footer.site a { color: #6cb6ff; }

:root { --hdr: 55px; }
.scroll-x { overflow-x: auto; }

/* Sticky thead + first column inside horizontally-scrollable tables */
.scroll-x table thead th {
  position: sticky; top: var(--hdr); background: #161a22; z-index: 2;
}
.scroll-x table th:first-child,
.scroll-x table td:first-child {
  position: sticky; left: 0; background: #161a22; z-index: 1;
  box-shadow: inset -1px 0 0 #2a2f3a;
}
.scroll-x table thead th:first-child { z-index: 3; }
tr.match:hover td:first-child { background: #1a1f2a; }

.cmp-player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cmp-banner {
  background: #0d1f35; border: 1px solid #1a4a7a; border-radius: 8px;
  padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; font-size: 14px;
}
.btn-cmp {
  display: inline-block; margin-top: 10px; padding: 5px 12px; border-radius: 6px;
  font-size: 13px; background: #1a1f2a; border: 1px solid #2a2f3a; color: #9aa3b2;
  cursor: pointer; text-decoration: none;
}
.btn-cmp:hover { border-color: #6cb6ff; color: #6cb6ff; text-decoration: none; }
.btn-cmp.active { background: #0d1f35; border-color: #6cb6ff; color: #6cb6ff; }

@media (max-width: 700px) {
  .compare { grid-template-columns: repeat(4, 1fr); }
  .cmp-player-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .player-name { font-size: 22px; }
  th, td { padding: 6px 8px; font-size: 13px; }
}
</style>
</head>
<body>

<header class="site">
  <div class="row">
    <h1><a id="home-link">SBL Dam stats</a></h1>
    <a href="#/records" style="font-size:14px;white-space:nowrap;color:#9aa3b2" id="records-link">Rekord</a>
    <div class="search">
      <input type="text" id="search" placeholder="Sök spelare eller lag…" autocomplete="off" aria-label="Sök spelare eller lag">
    </div>
  </div>
</header>

<main class="wrap" id="main">
  <div class="loading">Laddar data…</div>
</main>

<footer class="site">
  Data från FIBA LiveStats / Genius Sports. Verktyget byggt av <a href="https://github.com/groovestead/sbldamstats">Johannes Grufstedt</a>.
  <span id="meta"></span>
</footer>

<script>
// =============================================================================
// State
// =============================================================================

let DATA = null;          // hela datan från data.json
let STATS_BY_PLAYER = {}; // {player_key: [statRow, ...]}
let MATCHES_BY_ID = {};   // {match_id: matchObj}
let PLAYERS_BY_KEY = {};  // {player_key: playerObj}
let FIELD_INDEX = {};     // {fieldName: index in stat row}
let PBP_FOULS = {};       // {"player_key:match_id": [off, tech, unsport]}
let TEAMS_DATA = {};      // {teamName: {name, seasons:[{year,wins,losses,ptsFor,ptsAgainst,games}]}}
let FINALS = [];          // [{year, champion, finalist, aborted}]
let lastSearch = '';      // bevaras vid navigering tillbaka från spelare/lag-sida
let COMPARE_KEY = null;   // spelare A i pågående jämförelse
let recordsTab = 'current'; // 'current' | 'alltime'
let _pKey = null;             // current player page key
let _pSeason = null;          // selected season year (null = all seasons)
let _glSort = {col:null, dir:-1}; // game log sort state
let _pBests = {};             // {field: {val, matchId}} for current career/season bests
let _tName = null;            // current team page name
let _tSeason = null;          // selected season year on team page (null = all)

const $main = document.getElementById('main');
const $search = document.getElementById('search');
const $meta = document.getElementById('meta');

// =============================================================================
// Data laddning + index
// =============================================================================

async function load() {
  try {
    const r = await fetch('./data.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
  } catch (e) {
    $main.innerHTML = '<div class="empty"><p>Kunde inte ladda data: ' + escapeHtml(e.message) + '</p></div>';
    return;
  }

  // Bygg index för snabb uppslagning
  DATA.stat_fields.forEach((f, i) => { FIELD_INDEX[f] = i; });
  PBP_FOULS = DATA.pbp_fouls || {};

  for (const p of DATA.players) {
    PLAYERS_BY_KEY[p.key] = p;
  }
  for (const m of DATA.matches) {
    MATCHES_BY_ID[m.id] = m;
  }
  for (const row of DATA.stats) {
    const key = row[FIELD_INDEX.player_key];
    if (!STATS_BY_PLAYER[key]) STATS_BY_PLAYER[key] = [];
    STATS_BY_PLAYER[key].push(row);
  }
  // Sortera varje spelares matcher fallande på match_id (proxy för datum)
  for (const key in STATS_BY_PLAYER) {
    STATS_BY_PLAYER[key].sort((a, b) => b[FIELD_INDEX.match_id] - a[FIELD_INDEX.match_id]);
  }

  // Bygg lagindex från matcher
  FINALS = DATA.finals || [];
  const _teamSeasons = {};
  for (const m of DATA.matches) {
    if (m.hs == null || m.as == null) continue;
    for (const [team, isHome] of [[m.home, true], [m.away, false]]) {
      if (!team) continue;
      const k = team + '|' + m.year;
      if (!_teamSeasons[k]) _teamSeasons[k] = {team, year: m.year, wins: 0, losses: 0, ptsFor: 0, ptsAgainst: 0, games: 0};
      const ts = _teamSeasons[k];
      const myScore = isHome ? m.hs : m.as;
      const oppScore = isHome ? m.as : m.hs;
      ts.ptsFor += myScore; ts.ptsAgainst += oppScore; ts.games++;
      if (myScore > oppScore) ts.wins++; else ts.losses++;
    }
  }
  for (const ts of Object.values(_teamSeasons)) {
    if (!TEAMS_DATA[ts.team]) TEAMS_DATA[ts.team] = {name: ts.team, seasons: []};
    TEAMS_DATA[ts.team].seasons.push(ts);
  }
  for (const td of Object.values(TEAMS_DATA)) {
    td.seasons.sort((a, b) => b.year - a.year);
  }

  const years = DATA.matches.map(m => m.year).filter(Boolean);
  const minYear = Math.min(...years), maxYear = Math.max(...years);
  const seasonRange = fmtSeason(minYear) + '–' + fmtSeason(maxYear);
  $meta.textContent = ' · ' + DATA.meta.player_count + ' spelare, ' +
                      DATA.meta.match_count + ' matcher, säsongerna ' + seasonRange +
                      ' · uppdaterad ' + DATA.meta.generated_at.substring(0, 10);

  route();  // visa rätt sida
}

// =============================================================================
// Hjälpfunktioner
// =============================================================================

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmt(v, dec=1) {
  if (v == null || isNaN(v)) return '–';
  return Number(v).toFixed(dec);
}

function fmtInt(v) {
  if (v == null || isNaN(v)) return '–';
  return String(Math.round(v));
}

function get(row, field) {
  const i = FIELD_INDEX[field];
  return row[i];
}

// Returnerar [off, tech, unsport] för en spelare i en match, eller [0,0,0] om inget finns.
function getPbpFouls(playerKey, matchId) {
  return PBP_FOULS[playerKey + ':' + matchId] || null;
}

function avg(rows, field) {
  if (!rows.length) return null;
  let sum = 0, n = 0;
  for (const r of rows) {
    const v = get(r, field);
    if (v != null) { sum += v; n++; }
  }
  return n ? sum / n : null;
}

function fullName(p) {
  return ((p.first || '') + ' ' + (p.last || '')).trim();
}

// Avancerade effektivitetsmått (per match)
function efg(r) {
  const fga = get(r,'fg_att');
  if (!fga) return null;
  return (get(r,'fg_made') + 0.5 * (get(r,'three_made')||0)) / fga;
}
function ts(r) {
  const fga = get(r,'fg_att') || 0, fta = get(r,'ft_att') || 0;
  const denom = 2 * (fga + 0.44 * fta);
  return denom ? (get(r,'points') || 0) / denom : null;
}
function gmsc(r) {
  return (get(r,'points')||0)
    + 0.4*(get(r,'fg_made')||0)
    - 0.7*(get(r,'fg_att')||0)
    - 0.4*((get(r,'ft_att')||0)-(get(r,'ft_made')||0))
    + 0.7*(get(r,'rebounds_off')||0)
    + 0.3*(get(r,'rebounds_def')||0)
    + (get(r,'steals')||0)
    + 0.7*(get(r,'assists')||0)
    + 0.7*(get(r,'blocks')||0)
    - 0.4*(get(r,'fouls_personal')||0)
    - (get(r,'turnovers')||0);
}

function fmtSeason(year) {
  const y = Number(year);
  return (y % 100) + '/' + String((y + 1) % 100).padStart(2, '0');
}

// =============================================================================
// Routing (URL hash)
// =============================================================================

function route() {
  const hash = location.hash;
  if (hash.startsWith('#/player/')) {
    const key = decodeURIComponent(hash.substring('#/player/'.length));
    renderPlayerPage(key);
  } else if (hash.startsWith('#/team/')) {
    const name = decodeURIComponent(hash.substring('#/team/'.length));
    renderTeamPage(name);
  } else if (hash === '#/records') {
    renderRecordsPage();
  } else if (hash.startsWith('#/match/')) {
    const mid = parseInt(hash.substring('#/match/'.length), 10);
    if (mid) renderMatchPage(mid);
  } else if (hash.startsWith('#/compare/')) {
    const rest = hash.substring('#/compare/'.length);
    const slash = rest.indexOf('/');
    if (slash > 0) {
      renderComparePage(decodeURIComponent(rest.substring(0, slash)),
                        decodeURIComponent(rest.substring(slash + 1)));
    }
  } else {
    renderSearchPage($search.value);
  }
}

function navigateToPlayer(key) {
  lastSearch = $search.value;
  location.hash = '#/player/' + encodeURIComponent(key);
}

function navigateToTeam(name) {
  lastSearch = $search.value;
  location.hash = '#/team/' + encodeURIComponent(name);
}

function navigateToCompare(key1, key2) {
  location.hash = '#/compare/' + encodeURIComponent(key1) + '/' + encodeURIComponent(key2);
}

function cancelCompare() {
  COMPARE_KEY = null;
  route();
}

function handleCompareClick(key) {
  if (COMPARE_KEY === null) {
    COMPARE_KEY = key;
    renderPlayerPage(key);
  } else if (COMPARE_KEY === key) {
    COMPARE_KEY = null;
    renderPlayerPage(key);
  } else {
    navigateToCompare(COMPARE_KEY, key);
  }
}

function navigateHome(restoreSearch = false) {
  location.hash = '';
  $search.value = restoreSearch ? lastSearch : '';
  if (!restoreSearch) lastSearch = '';
  $search.focus();
}

document.getElementById('home-link').addEventListener('click', navigateHome);

window.addEventListener('hashchange', route);
window.addEventListener('popstate', route);

// =============================================================================
// Sökfunktion
// =============================================================================

function searchPlayers(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  const matches = [];
  for (const p of DATA.players) {
    const full = (p.first + ' ' + p.last).toLowerCase();
    if (full.includes(q)) {
      matches.push(p);
    }
  }
  // Sortera: namn som börjar med q först, sen efter antal matcher (mest spelade överst)
  matches.sort((a, b) => {
    const aStarts = a.first.toLowerCase().startsWith(q) || a.last.toLowerCase().startsWith(q);
    const bStarts = b.first.toLowerCase().startsWith(q) || b.last.toLowerCase().startsWith(q);
    if (aStarts !== bStarts) return aStarts ? -1 : 1;
    const aGames = (STATS_BY_PLAYER[a.key] || []).length;
    const bGames = (STATS_BY_PLAYER[b.key] || []).length;
    return bGames - aGames;
  });
  return matches.slice(0, 50);
}

function getLatestTeam(playerKey) {
  const rows = STATS_BY_PLAYER[playerKey];
  if (!rows || !rows.length) return '';
  return get(rows[0], 'team_name') || '';
}

// =============================================================================
// Render: söksida
// =============================================================================

function searchTeams(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return Object.values(TEAMS_DATA)
    .filter(td => td.name.toLowerCase().includes(q))
    .sort((a, b) => {
      const aStarts = a.name.toLowerCase().startsWith(q);
      const bStarts = b.name.toLowerCase().startsWith(q);
      if (aStarts !== bStarts) return aStarts ? -1 : 1;
      const aTot = a.seasons.reduce((s, x) => s + x.games, 0);
      const bTot = b.seasons.reduce((s, x) => s + x.games, 0);
      return bTot - aTot;
    });
}

function teamChampionships(teamName) {
  return FINALS.filter(f => f.champion === teamName && !f.aborted).length;
}

function renderTeamCards(teams) {
  return teams.map(td => {
    const gold = teamChampionships(td.name);
    const latestSeason = td.seasons[0];
    const metaParts = [];
    if (latestSeason) metaParts.push('Senast: ' + fmtSeason(latestSeason.year));
    if (gold) metaParts.push('🏆 ' + gold + ' SM-guld');
    return `
      <a class="result" href="#/team/${encodeURIComponent(td.name)}">
        <div class="photo" style="display:flex;align-items:center;justify-content:center;font-size:22px">🏀</div>
        <div>
          <div class="name">${escapeHtml(td.name)}</div>
          <div class="meta">${metaParts.join(' · ')}</div>
        </div>
      </a>`;
  }).join('');
}

function renderTodayMatches() {
  const today = new Date().toISOString().slice(0, 10); // "2026-05-14"
  const todayMs = DATA.matches.filter(m => m.date_parsed && m.date_parsed.slice(0,10) === today);

  // Om inga matcher idag, visa närmaste kommande
  let label = 'Idag';
  let shown = todayMs;
  if (!todayMs.length) {
    const upcoming = DATA.matches
      .filter(m => m.date_parsed && m.date_parsed > today && m.hs == null)
      .sort((a,b) => a.date_parsed.localeCompare(b.date_parsed))
      .slice(0, 4);
    if (!upcoming.length) return '';
    shown = upcoming;
    label = 'Kommande matcher';
  }

  const hasStats = mid => DATA.stats.some(r => get(r,'match_id') === mid);
  const rows = shown.map(m => {
    const finished = m.hs != null && m.as != null;
    const score = finished
      ? `<span style="font-size:20px;font-weight:700;font-variant-numeric:tabular-nums">${m.hs} – ${m.as}</span>`
      : `<span class="muted">vs</span>`;
    const link = finished && hasStats(m.id)
      ? `<a href="#/match/${m.id}" style="font-size:13px;margin-left:auto;white-space:nowrap">Box score →</a>`
      : '';
    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #1e2a3a;flex-wrap:wrap">
      <div style="font-size:13px;color:#9aa3b2;min-width:80px">${escapeHtml(m.date_parsed||m.date||'')}</div>
      <div style="font-weight:600"><a href="#/team/${encodeURIComponent(m.home)}">${escapeHtml(m.home)}</a></div>
      ${score}
      <div style="font-weight:600"><a href="#/team/${encodeURIComponent(m.away)}">${escapeHtml(m.away)}</a></div>
      ${link}
    </div>`;
  }).join('');

  return `
    <div class="section">
      <h2>${label}</h2>
      <div class="card">${rows}</div>
    </div>`;
}

function renderSeasonLeaders() {
  const allYears = DATA.matches.map(m => m.year).filter(Boolean);
  const currentYear = Math.max(...allYears);

  const byPlayer = {};
  for (const r of DATA.stats) {
    const m = MATCHES_BY_ID[get(r,'match_id')];
    if (!m || m.year !== currentYear) continue;
    const k = get(r,'player_key');
    if (!byPlayer[k]) byPlayer[k] = {pkey: k, rows: []};
    byPlayer[k].rows.push(r);
  }

  const pStats = Object.values(byPlayer).filter(p => p.rows.length >= 3).map(p => ({
    pkey: p.pkey, games: p.rows.length,
    pts: avg(p.rows,'points'),
    reb: p.rows.reduce((s,r)=>s+(get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0),0)/p.rows.length,
    ast: avg(p.rows,'assists'),
    stl: avg(p.rows,'steals'),
    blk: avg(p.rows,'blocks'),
    fg3: avg(p.rows,'three_made'),
  }));

  function leaderTable(field, title) {
    const leaders = pStats.filter(p => p[field] > 0).sort((a,b)=>b[field]-a[field]).slice(0,5);
    if (!leaders.length) return '';
    const rows = leaders.map((p,i) => {
      const pl = PLAYERS_BY_KEY[p.pkey];
      const name = pl ? fullName(pl) : p.pkey;
      return `<tr>
        <td style="width:20px;padding:4px 6px 4px 0;color:#6c7a8c;font-size:12px;text-align:left">${i+1}</td>
        <td style="padding:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0">
          <a href="#/player/${encodeURIComponent(p.pkey)}" style="font-size:13px">${escapeHtml(name)}</a></td>
        <td style="padding:4px 0 4px 6px;text-align:right;font-weight:700;font-size:14px;width:36px">${p[field].toFixed(1)}</td>
      </tr>`;
    }).join('');
    return `<div style="min-width:0">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6c7a8c;margin-bottom:8px">${title}</div>
      <table style="table-layout:fixed;width:100%"><tbody>${rows}</tbody></table>
    </div>`;
  }

  const tables = [
    leaderTable('pts','Poäng/match'), leaderTable('reb','Returer/match'),
    leaderTable('ast','Assists/match'), leaderTable('stl','Steals/match'),
    leaderTable('blk','Blocks/match'), leaderTable('fg3','Trepoängare/match'),
  ].filter(Boolean).join('');

  return `
    <div class="section">
      <h2>Säsong ${fmtSeason(currentYear)} — Ligaledare</h2>
      <div class="card">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:24px">${tables}</div>
      </div>
    </div>`;
}

function renderSearchPage(query) {
  if (!query || !query.trim()) {
    // Startsida: visa alla lag
    const allTeams = Object.values(TEAMS_DATA).sort((a, b) => {
      const ag = teamChampionships(a.name), bg = teamChampionships(b.name);
      if (ag !== bg) return bg - ag;
      return a.name.localeCompare(b.name, 'sv');
    });
    $main.innerHTML = `
      <div class="empty" style="margin-bottom:0">
        <p>Sök efter en spelare eller ett lag i rutan ovan.</p>
      </div>
      ${renderTodayMatches()}
      ${renderSeasonLeaders()}
      <div class="section">
        <h2>Lag (${allTeams.length})</h2>
        <div class="results">${renderTeamCards(allTeams)}</div>
      </div>`;
    return;
  }

  const players = searchPlayers(query);
  const teams = searchTeams(query);

  if (!players.length && !teams.length) {
    $main.innerHTML = `<div class="empty"><p>Inga spelare eller lag hittade för "${escapeHtml(query)}".</p></div>`;
    return;
  }

  let html = '';

  if (teams.length) {
    html += `
      <div class="section">
        <h2>${teams.length} lag</h2>
        <div class="results">${renderTeamCards(teams)}</div>
      </div>`;
  }

  if (players.length) {
    const cards = players.map(p => {
      const games = (STATS_BY_PLAYER[p.key] || []).length;
      const team = getLatestTeam(p.key);
      const metaParts = [];
      if (p.pos) metaParts.push(escapeHtml(p.pos));
      if (team) metaParts.push(escapeHtml(team));
      if (games) metaParts.push(games + ' matcher');

      const photo = p.photo
        ? `<img class="photo" src="${escapeHtml(p.photo)}" alt="${escapeHtml(fullName(p))}" loading="lazy">`
        : `<div class="photo"></div>`;

      return `
        <a class="result" href="#/player/${encodeURIComponent(p.key)}">
          ${photo}
          <div>
            <div class="name">${escapeHtml(fullName(p))}</div>
            <div class="meta">${metaParts.join(' · ')}</div>
          </div>
        </a>`;
    }).join('');

    html += `
      <div class="section">
        <h2>${players.length} spelare</h2>
        <div class="results">${cards}</div>
      </div>`;
  }

  $main.innerHTML = html;
}

// =============================================================================
// Render: spelarsida
// =============================================================================

function backLink() {
  const href = lastSearch ? '#' : '#';
  const label = lastSearch ? `← Tillbaka till "${escapeHtml(lastSearch)}"` : '← Tillbaka';
  return `<a href="${href}" onclick="navigateHome(true);return false;" style="font-size:13px;color:#9aa3b2">${label}</a>`;
}

function computeBests(rows) {
  const BEST_CATS = [
    {key:'points',    label:'PTS', fn: r => get(r,'points')},
    {key:'reb',       label:'REB', fn: r => (get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0)},
    {key:'assists',   label:'AST', fn: r => get(r,'assists')},
    {key:'steals',    label:'STL', fn: r => get(r,'steals')},
    {key:'blocks',    label:'BLK', fn: r => get(r,'blocks')},
    {key:'three_made',label:'3PT', fn: r => get(r,'three_made')},
  ];
  const bests = {};
  for (const cat of BEST_CATS) {
    let bestVal = null, bestMid = null;
    for (const r of rows) {
      const v = cat.fn(r);
      if (v != null && (bestVal === null || v > bestVal)) {
        bestVal = v; bestMid = get(r,'match_id');
      }
    }
    if (bestVal !== null) bests[cat.key] = {val: bestVal, matchId: bestMid, label: cat.label};
  }
  return bests;
}

function renderBestsBox(bests, label) {
  const cells = Object.values(bests);
  if (!cells.length) return '';
  const items = cells.map(b => {
    const m = MATCHES_BY_ID[b.matchId];
    const sub = m ? fmtSeason(m.year) : '';
    return `<div style="text-align:center">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6c7a8c">${b.label}</div>
      <div style="font-size:22px;font-weight:700;color:#ffd700;line-height:1.2">${b.val}</div>
      <div style="font-size:11px;color:#9aa3b2">${sub}</div>
    </div>`;
  }).join('');
  return `
    <div class="section">
      <h2>${label}</h2>
      <div class="card">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:12px 8px">${items}</div>
      </div>
    </div>`;
}

function buildPlayerStats(rows) {
  _pBests = computeBests(rows);
  const bestsLabel = _pSeason ? `Säsongen ${fmtSeason(_pSeason)} — bästa match` : 'Karriärbäst';
  return renderBestsBox(_pBests, bestsLabel)
       + renderRecentVsSeason(rows)
       + renderSeasonsTable(rows)
       + renderTeamsTable(teamsByYear(rows))
       + renderGameLog(rows);
}

function filterPlayerPage(year) {
  _pSeason = year;
  document.querySelectorAll('.p-season-btn').forEach(btn => {
    const active = year === null ? btn.dataset.year === 'all' : Number(btn.dataset.year) === year;
    btn.style.background = active ? '#1a3a5c' : 'transparent';
    btn.style.color     = active ? '#e8edf4'  : '#9aa3b2';
  });
  const statsDiv = document.getElementById('player-stats');
  if (!statsDiv) return;
  const all = STATS_BY_PLAYER[_pKey] || [];
  const rows = year ? all.filter(r => {
    const m = MATCHES_BY_ID[get(r,'match_id')];
    return m && m.year === year;
  }) : all;
  _glSort = {col:null, dir:-1};
  statsDiv.innerHTML = buildPlayerStats(rows);
}

function renderPlayerPage(key) {
  if (key !== _pKey) { _glSort = {col:null, dir:-1}; _pSeason = null; }
  _pKey = key;
  const player = PLAYERS_BY_KEY[key];
  if (!player) {
    $main.innerHTML = `<div class="empty"><p>Spelaren finns inte.</p><p>${backLink()}</p></div>`;
    return;
  }

  const allRows = STATS_BY_PLAYER[key] || [];
  if (!allRows.length) {
    $main.innerHTML = `
      <div class="card"><div class="player-grid">
        ${player.photo ? `<img class="photo" src="${escapeHtml(player.photo)}">` : '<div class="photo"></div>'}
        <div>
          <div class="player-name">${escapeHtml(fullName(player))}</div>
          <div class="player-meta">Inga matcher i databasen.</div>
        </div>
      </div></div>`;
    return;
  }

  // Header
  const teams = teamsByYear(allRows);
  const latestTeam = teams.length ? teams[0].team : '';
  const metaParts = [];
  if (player.pos) metaParts.push(escapeHtml(player.pos));
  if (player.shirt) metaParts.push('#' + escapeHtml(player.shirt));
  if (latestTeam) metaParts.push(escapeHtml(latestTeam));

  const photo = player.photo
    ? `<img class="photo" src="${escapeHtml(player.photo)}" alt="${escapeHtml(fullName(player))}">`
    : `<div class="photo"></div>`;

  // Jämförelseknapp och eventuell banner
  let compareBanner = '';
  let cmpBtnLabel = 'Jämför';
  let cmpBtnClass = 'btn-cmp';
  if (COMPARE_KEY === key) {
    cmpBtnLabel = '✕ Avmarkera';
    cmpBtnClass = 'btn-cmp active';
  } else if (COMPARE_KEY !== null) {
    const cmpP = PLAYERS_BY_KEY[COMPARE_KEY];
    const cmpName = cmpP ? fullName(cmpP) : COMPARE_KEY;
    cmpBtnLabel = `Jämför med ${escapeHtml(cmpName)} →`;
    cmpBtnClass = 'btn-cmp active';
    compareBanner = `
      <div class="cmp-banner">
        <span style="color:#6cb6ff">⇄</span>
        <span>Jämförelse pågår: <strong>${escapeHtml(cmpName)}</strong></span>
        <button onclick="cancelCompare()" style="margin-left:auto;background:none;border:none;color:#9aa3b2;cursor:pointer;font-size:13px;padding:0">✕ Avbryt</button>
      </div>`;
  }

  let html = `
    <div style="margin-bottom:10px">${backLink()}</div>
    ${compareBanner}
    <div class="card">
      <div class="player-grid">
        ${photo}
        <div>
          <div class="player-name">${escapeHtml(fullName(player))}</div>
          <div class="player-meta">${metaParts.join(' · ')}</div>
          <button class="${cmpBtnClass}" onclick="handleCompareClick('${escapeHtml(key)}')">${cmpBtnLabel}</button>
        </div>
      </div>
    </div>`;

  const seasons = [...new Set(allRows.map(r => {
    const m = MATCHES_BY_ID[get(r,'match_id')];
    return m ? m.year : null;
  }).filter(Boolean))].sort((a,b) => b-a);

  const btnStyle = active =>
    `cursor:pointer;padding:5px 12px;border-radius:14px;font-size:13px;font-weight:600;border:none;` +
    (active ? 'background:#1a3a5c;color:#e8edf4;' : 'background:transparent;color:#9aa3b2;');

  const seasonBtns = seasons.map(y =>
    `<button class="p-season-btn" data-year="${y}" style="${btnStyle(_pSeason===y)}" onclick="filterPlayerPage(${y})">${fmtSeason(y)}</button>`
  ).join('');

  html += `
    <div style="display:flex;gap:4px;background:#161f2e;border-radius:20px;padding:4px;width:fit-content;flex-wrap:wrap;margin:16px 0 4px">
      <button class="p-season-btn" data-year="all" style="${btnStyle(_pSeason===null)}" onclick="filterPlayerPage(null)">Alla säsonger</button>
      ${seasonBtns}
    </div>`;

  // Stats (filter-uppdaterbara)
  const filteredRows = _pSeason ? allRows.filter(r => {
    const m = MATCHES_BY_ID[get(r,'match_id')];
    return m && m.year === _pSeason;
  }) : allRows;
  html += `<div id="player-stats">${buildPlayerStats(filteredRows)}</div>`;

  $main.innerHTML = html;
  window.scrollTo(0, 0);
}

function renderRecentVsSeason(allRows) {
  const last5 = allRows.slice(0, 5);
  if (last5.length === 0) return '';
  const latestMatchId = get(last5[0], 'match_id');
  const latestMatch = MATCHES_BY_ID[latestMatchId];
  if (!latestMatch) return '';
  const seasonYear = latestMatch.year;

  // Säsongssnittet ska vara över hennes matcher i den säsongen
  const seasonRows = allRows.filter(r => {
    const m = MATCHES_BY_ID[get(r, 'match_id')];
    return m && m.year === seasonYear;
  });

  const cells = [
    {label: 'PTS', field: 'points'},
    {label: 'REB', field: null, calc: r => (get(r,'rebounds_def')||0) + (get(r,'rebounds_off')||0)},
    {label: 'AST', field: 'assists'},
    {label: 'STL', field: 'steals'},
    {label: 'BLK', field: 'blocks'},
    {label: 'TOV', field: 'turnovers'},
    {label: '+/-', field: 'plus_minus'},
  ].map(c => {
    const aggRows = (rows) => {
      if (c.calc) {
        const vs = rows.map(c.calc).filter(v => v != null);
        return vs.length ? vs.reduce((a,b)=>a+b,0) / vs.length : null;
      }
      return avg(rows, c.field);
    };
    const recent = aggRows(last5);
    const season = aggRows(seasonRows);
    let delta = '';
    if (recent != null && season != null) {
      const diff = recent - season;
      if (Math.abs(diff) < 0.05) {
        delta = `<div class="delta zero">±0.0</div>`;
      } else if (diff > 0) {
        delta = `<div class="delta up">+${diff.toFixed(1)} vs säsong</div>`;
      } else {
        delta = `<div class="delta down">${diff.toFixed(1)} vs säsong</div>`;
      }
    }
    return `
      <div class="stat">
        <div class="label">${c.label}</div>
        <div class="val">${fmt(recent)}</div>
        ${delta}
      </div>`;
  }).join('');

  return `
    <div class="section">
      <h2>Senaste ${last5.length} matcher · säsong ${fmtSeason(seasonYear)}</h2>
      <div class="card">
        <div class="muted" style="margin-bottom:6px">Snitt över hennes senaste matcher i jämförelse med hela säsongens snitt</div>
        <div class="compare">${cells}</div>
      </div>
    </div>`;
}

function renderSeasonsTable(allRows) {
  // Gruppera per säsong
  const bySeason = {};
  for (const r of allRows) {
    const m = MATCHES_BY_ID[get(r, 'match_id')];
    if (!m) continue;
    if (!bySeason[m.year]) bySeason[m.year] = [];
    bySeason[m.year].push(r);
  }
  const years = Object.keys(bySeason).map(Number).sort((a,b) => b-a);
  if (!years.length) return '';

  const rows = years.map(y => {
    const rs = bySeason[y];
    const reb = rs.map(r => (get(r,'rebounds_def')||0) + (get(r,'rebounds_off')||0));
    const rebAvg = reb.length ? reb.reduce((a,b)=>a+b,0)/reb.length : null;
    let totalOff = 0, totalTech = 0;
    for (const r of rs) {
      const pf = getPbpFouls(get(r,'player_key'), get(r,'match_id'));
      if (pf) { totalOff += pf[0]; totalTech += pf[1] + pf[2]; }
    }
    const ofCell = totalOff ? `<td style="color:#ff8b8b">${totalOff}</td>` : '<td class="muted">0</td>';
    const tfCell = totalTech ? `<td style="color:#ff8b8b">${totalTech}</td>` : '<td class="muted">0</td>';
    // Avancerade effektivitetsmått aggregerade över säsongen
    const fgMadeTot = rs.reduce((s,r)=>s+(get(r,'fg_made')||0),0);
    const fgAttTot  = rs.reduce((s,r)=>s+(get(r,'fg_att')||0),0);
    const tpMadeTot = rs.reduce((s,r)=>s+(get(r,'three_made')||0),0);
    const ptsTot    = rs.reduce((s,r)=>s+(get(r,'points')||0),0);
    const ftAttTot  = rs.reduce((s,r)=>s+(get(r,'ft_att')||0),0);
    const efgSeason = fgAttTot ? (fgMadeTot + 0.5*tpMadeTot) / fgAttTot : null;
    const tsSeason  = (2*(fgAttTot + 0.44*ftAttTot)) ? ptsTot / (2*(fgAttTot + 0.44*ftAttTot)) : null;
    const gmscVals  = rs.map(r => gmsc(r));
    const gmscSeason = gmscVals.length ? gmscVals.reduce((a,b)=>a+b,0)/gmscVals.length : null;
    return `
      <tr>
        <td>${fmtSeason(y)}</td>
        <td>${rs.length}</td>
        <td>${fmt(avg(rs,'points'))}</td>
        <td>${fmt(rebAvg)}</td>
        <td>${fmt(avg(rs,'assists'))}</td>
        <td>${fmt(avg(rs,'steals'))}</td>
        <td>${fmt(avg(rs,'blocks'))}</td>
        <td>${fmt(avg(rs,'turnovers'))}</td>
        ${ofCell}
        ${tfCell}
        <td>${fmt(avg(rs,'fg_made'))}/${fmt(avg(rs,'fg_att'))}</td>
        <td>${fmt(avg(rs,'three_made'))}/${fmt(avg(rs,'three_att'))}</td>
        <td>${fmt(avg(rs,'ft_made'))}/${fmt(avg(rs,'ft_att'))}</td>
        <td>${fmt(avg(rs,'plus_minus'))}</td>
        <td style="color:#a0c4ff" title="eFG%">${efgSeason != null ? (efgSeason*100).toFixed(1)+'%' : '–'}</td>
        <td style="color:#a0c4ff" title="True Shooting%">${tsSeason  != null ? (tsSeason *100).toFixed(1)+'%' : '–'}</td>
        <td style="color:#a0c4ff" title="Game Score">${fmt(gmscSeason)}</td>
      </tr>`;
  }).join('');

  return `
    <div class="section">
      <h2>Säsongssnitt</h2>
      <div class="card scroll-x">
        <table>
          <thead><tr>
            <th>Säsong</th><th>Matcher</th>
            <th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TOV</th>
            <th title="Offensiva fouls (totalt)">OF</th><th title="Tekniska/osportsliga fouls (totalt)">TF</th>
            <th>FG</th><th>3P</th><th>FT</th><th>+/-</th>
            <th title="Effective Field Goal %">eFG%</th>
            <th title="True Shooting %">TS%</th>
            <th title="Game Score">GmSc</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function teamsByYear(allRows) {
  const counts = {};
  for (const r of allRows) {
    const m = MATCHES_BY_ID[get(r, 'match_id')];
    if (!m) continue;
    const k = m.year + '|' + (get(r, 'team_name') || '');
    if (!counts[k]) counts[k] = {year: m.year, team: get(r, 'team_name') || '', games: 0};
    counts[k].games++;
  }
  const arr = Object.values(counts);
  arr.sort((a, b) => (b.year - a.year) || (b.games - a.games));
  return arr;
}

function renderTeamsTable(teams) {
  if (!teams.length) return '';
  const rows = teams.map(t => {
    const teamLink = TEAMS_DATA[t.team]
      ? `<a href="#/team/${encodeURIComponent(t.team)}">${escapeHtml(t.team)}</a>`
      : escapeHtml(t.team);
    return `<tr><td>${fmtSeason(t.year)}</td><td>${teamLink}</td><td>${t.games} matcher</td></tr>`;
  }).join('');
  return `
    <div class="section">
      <h2>Lag</h2>
      <div class="card scroll-x">
        <table>
          <thead><tr><th>Säsong</th><th>Lag</th><th>Antal matcher</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// =============================================================================
// Render: jämförelsesida
// =============================================================================

function playerCareerAvg(rows) {
  const reb = rows.map(r => (get(r,'rebounds_def')||0) + (get(r,'rebounds_off')||0));
  const rebAvg = reb.length ? reb.reduce((a,b)=>a+b,0)/reb.length : null;
  const fgMade = rows.reduce((s,r)=>s+(get(r,'fg_made')||0),0);
  const fgAtt  = rows.reduce((s,r)=>s+(get(r,'fg_att')||0),0);
  const tpMade = rows.reduce((s,r)=>s+(get(r,'three_made')||0),0);
  const tpAtt  = rows.reduce((s,r)=>s+(get(r,'three_att')||0),0);
  const ftMade = rows.reduce((s,r)=>s+(get(r,'ft_made')||0),0);
  const ftAtt  = rows.reduce((s,r)=>s+(get(r,'ft_att')||0),0);
  return {
    pts: avg(rows,'points'), reb: rebAvg,
    ast: avg(rows,'assists'), stl: avg(rows,'steals'),
    blk: avg(rows,'blocks'),  tov: avg(rows,'turnovers'),
    fg:  fgAtt  ? fgMade/fgAtt*100   : null,
    tp:  tpAtt  ? tpMade/tpAtt*100   : null,
    ft:  ftAtt  ? ftMade/ftAtt*100   : null,
    games: rows.length,
  };
}

function cmpBar(valA, valB, side) {
  // side: 'a' = blå höger-utfyllnad, 'b' = orange vänster-utfyllnad
  const mx = Math.max(valA||0, valB||0);
  if (!mx) return '<td style="width:80px"></td>';
  const val = side === 'a' ? (valA||0) : (valB||0);
  const pct = Math.round(val / mx * 100);
  const color = side === 'a' ? '#6cb6ff' : '#ff9966';
  const align = side === 'a' ? 'flex-end' : 'flex-start';
  return `<td style="width:80px;padding:0 4px">
    <div style="display:flex;justify-content:${align}">
      <div style="height:5px;border-radius:3px;background:${color};width:${pct}%;min-width:${pct?2:0}px"></div>
    </div></td>`;
}

function renderComparePage(key1, key2) {
  const p1 = PLAYERS_BY_KEY[key1], p2 = PLAYERS_BY_KEY[key2];
  if (!p1 || !p2) {
    $main.innerHTML = `<div class="empty"><p>Kunde inte hitta en eller båda spelarna.</p><p>${backLink()}</p></div>`;
    return;
  }
  const rows1 = STATS_BY_PLAYER[key1] || [];
  const rows2 = STATS_BY_PLAYER[key2] || [];
  const s1 = playerCareerAvg(rows1), s2 = playerCareerAvg(rows2);

  // Header: två spelarkort sida vid sida
  function playerCard(p, s, key, side) {
    const photo = p.photo
      ? `<img class="photo" src="${escapeHtml(p.photo)}" alt="${escapeHtml(fullName(p))}" style="width:64px;height:64px;border-radius:10px;object-fit:cover">`
      : `<div class="photo" style="width:64px;height:64px;border-radius:10px;background:#2a2f3a"></div>`;
    const color = side === 'a' ? '#6cb6ff' : '#ff9966';
    return `
      <div class="card" style="border-color:${color}40">
        <div style="display:flex;gap:12px;align-items:center">
          ${photo}
          <div>
            <div style="font-weight:700;font-size:18px"><a href="#/player/${encodeURIComponent(key)}">${escapeHtml(fullName(p))}</a></div>
            <div class="muted" style="font-size:13px;margin-top:2px">${[p.pos, s.games + ' matcher'].filter(Boolean).join(' · ')}</div>
          </div>
        </div>
      </div>`;
  }

  let html = `
    <div style="margin-bottom:10px">${backLink()}</div>
    <div class="cmp-player-grid" style="margin-bottom:20px">
      ${playerCard(p1, s1, key1, 'a')}
      ${playerCard(p2, s2, key2, 'b')}
    </div>`;

  // Karriärsnitt med staplar
  const statDefs = [
    {label:'PTS/m', a:s1.pts,  b:s2.pts,  dec:1},
    {label:'REB/m', a:s1.reb,  b:s2.reb,  dec:1},
    {label:'AST/m', a:s1.ast,  b:s2.ast,  dec:1},
    {label:'STL/m', a:s1.stl,  b:s2.stl,  dec:1},
    {label:'BLK/m', a:s1.blk,  b:s2.blk,  dec:1},
    {label:'TOV/m', a:s1.tov,  b:s2.tov,  dec:1},
    {label:'FG%',   a:s1.fg,   b:s2.fg,   dec:1},
    {label:'3P%',   a:s1.tp,   b:s2.tp,   dec:1},
    {label:'FT%',   a:s1.ft,   b:s2.ft,   dec:1},
  ];

  const statRows = statDefs.filter(d => d.a != null || d.b != null).map(d => {
    const va = d.a != null ? d.a.toFixed(d.dec) : '–';
    const vb = d.b != null ? d.b.toFixed(d.dec) : '–';
    const winA = d.a != null && (d.b == null || d.a > d.b);
    const winB = d.b != null && (d.a == null || d.b > d.a);
    // TOV är inverterat — lägre är bättre
    const invertedWinA = d.label==='TOV/m' && d.a != null && (d.b == null || d.a < d.b);
    const invertedWinB = d.label==='TOV/m' && d.b != null && (d.a == null || d.b < d.a);
    const boldA = (d.label!=='TOV/m' && winA) || invertedWinA;
    const boldB = (d.label!=='TOV/m' && winB) || invertedWinB;
    return `
      <tr>
        <td style="font-weight:${boldA?700:400};color:${boldA?'#6cb6ff':'inherit'}">${va}</td>
        ${cmpBar(d.a, d.b, 'a')}
        <td style="text-align:center;color:#9aa3b2;font-size:12px;white-space:nowrap">${d.label}</td>
        ${cmpBar(d.a, d.b, 'b')}
        <td style="font-weight:${boldB?700:400};color:${boldB?'#ff9966':'inherit'}">${vb}</td>
      </tr>`;
  }).join('');

  html += `
    <div class="section">
      <h2>Karriärsnitt — alla säsonger</h2>
      <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px">
          <span style="color:#6cb6ff;font-weight:600">${escapeHtml(fullName(p1))}</span>
          <span style="color:#ff9966;font-weight:600">${escapeHtml(fullName(p2))}</span>
        </div>
        <div class="scroll-x">
          <table style="width:100%">
            <tbody>${statRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;

  // Säsong för säsong
  const seasons1 = {}, seasons2 = {};
  for (const r of rows1) { const m = MATCHES_BY_ID[get(r,'match_id')]; if (m) { if (!seasons1[m.year]) seasons1[m.year]=[]; seasons1[m.year].push(r); } }
  for (const r of rows2) { const m = MATCHES_BY_ID[get(r,'match_id')]; if (m) { if (!seasons2[m.year]) seasons2[m.year]=[]; seasons2[m.year].push(r); } }
  const allYears = [...new Set([...Object.keys(seasons1),...Object.keys(seasons2)].map(Number))].sort((a,b)=>b-a);

  if (allYears.length > 1) {
    const seasonRows = allYears.map(y => {
      const r1 = seasons1[y], r2 = seasons2[y];
      const pts1 = r1 ? avg(r1,'points') : null, pts2 = r2 ? avg(r2,'points') : null;
      const reb1 = r1 ? r1.map(r=>(get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0)).reduce((a,b)=>a+b,0)/r1.length : null;
      const reb2 = r2 ? r2.map(r=>(get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0)).reduce((a,b)=>a+b,0)/r2.length : null;
      const ast1 = r1 ? avg(r1,'assists') : null, ast2 = r2 ? avg(r2,'assists') : null;
      const g1 = r1 ? r1.length : 0, g2 = r2 ? r2.length : 0;
      return `<tr class="match">
        <td>${fmtSeason(y)}</td>
        <td style="color:#6cb6ff">${fmt(pts1)}</td><td style="color:#6cb6ff">${fmt(reb1)}</td><td style="color:#6cb6ff">${fmt(ast1)}</td>
        <td class="muted" style="font-size:12px">${g1 || '–'}</td>
        <td class="muted" style="border-left:1px solid #2a2f3a"></td>
        <td class="muted" style="font-size:12px">${g2 || '–'}</td>
        <td style="color:#ff9966">${fmt(pts2)}</td><td style="color:#ff9966">${fmt(reb2)}</td><td style="color:#ff9966">${fmt(ast2)}</td>
      </tr>`;
    }).join('');
    html += `
      <div class="section">
        <h2>Säsong för säsong</h2>
        <div class="card scroll-x">
          <table>
            <thead><tr>
              <th>Säsong</th>
              <th colspan="3" style="color:#6cb6ff;text-align:center">${escapeHtml(p1.first)}</th>
              <th style="font-size:11px">M</th>
              <th></th>
              <th style="font-size:11px">M</th>
              <th colspan="3" style="color:#ff9966;text-align:center">${escapeHtml(p2.first)}</th>
            </tr>
            <tr>
              <th></th>
              <th>PTS</th><th>REB</th><th>AST</th><th></th><th></th><th></th>
              <th>PTS</th><th>REB</th><th>AST</th>
            </tr></thead>
            <tbody>${seasonRows}</tbody>
          </table>
        </div>
      </div>`;
  }

  $main.innerHTML = html;
  window.scrollTo(0, 0);
}

function renderMatchPage(matchId) {
  const m = MATCHES_BY_ID[matchId];
  if (!m) {
    $main.innerHTML = `<div class="empty"><p>Matchen finns inte.</p><p>${backLink()}</p></div>`;
    return;
  }

  const allRows = DATA.stats.filter(r => get(r,'match_id') === matchId);
  const homeRows = allRows.filter(r => get(r,'team_name') === m.home);
  const awayRows = allRows.filter(r => get(r,'team_name') === m.away);

  function boxTable(rows, teamName) {
    if (!rows.length) return '';
    // Sortera: starters först (is_starter desc), sedan poäng desc
    const sorted = rows.slice().sort((a,b) => {
      const sd = (get(b,'is_starter')||0) - (get(a,'is_starter')||0);
      return sd || (get(b,'points')||0) - (get(a,'points')||0);
    });

    let teamPts=0, teamReb=0, teamAst=0, teamStl=0, teamBlk=0, teamTov=0;
    let teamFgM=0, teamFgA=0, team3M=0, team3A=0, teamFtM=0, teamFtA=0;

    const bodyRows = sorted.map(r => {
      const pkey = get(r,'player_key');
      const p = PLAYERS_BY_KEY[pkey];
      const name = p ? fullName(p) : (pkey || '');
      const reb = (get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0);
      const starter = get(r,'is_starter') ? '●' : '';
      const pf = getPbpFouls(pkey, matchId);
      const ofFoul = pf ? pf[0] : 0, tfFoul = pf ? (pf[1]+pf[2]) : 0;
      teamPts += get(r,'points')||0; teamReb += reb;
      teamAst += get(r,'assists')||0; teamStl += get(r,'steals')||0;
      teamBlk += get(r,'blocks')||0; teamTov += get(r,'turnovers')||0;
      teamFgM += get(r,'fg_made')||0; teamFgA += get(r,'fg_att')||0;
      team3M  += get(r,'three_made')||0; team3A  += get(r,'three_att')||0;
      teamFtM += get(r,'ft_made')||0;  teamFtA  += get(r,'ft_att')||0;
      const efgVal = efg(r), tsVal = ts(r), gmscVal = gmsc(r);
      return `<tr class="match">
        <td style="text-align:left;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <span class="muted" style="font-size:11px;margin-right:4px">${starter}</span>
          <a href="#/player/${encodeURIComponent(pkey)}">${escapeHtml(name)}</a></td>
        <td>${escapeHtml(get(r,'minutes')||'')}</td>
        <td><strong>${fmtInt(get(r,'points'))}</strong></td>
        <td>${fmtInt(reb)}</td>
        <td>${fmtInt(get(r,'assists'))}</td>
        <td>${fmtInt(get(r,'steals'))}</td>
        <td>${fmtInt(get(r,'blocks'))}</td>
        <td>${fmtInt(get(r,'turnovers'))}</td>
        <td>${ofFoul||'–'}</td>
        <td>${fmtInt(get(r,'fg_made'))}/${fmtInt(get(r,'fg_att'))}</td>
        <td>${fmtInt(get(r,'three_made'))}/${fmtInt(get(r,'three_att'))}</td>
        <td>${fmtInt(get(r,'ft_made'))}/${fmtInt(get(r,'ft_att'))}</td>
        <td>${fmtInt(get(r,'plus_minus'))}</td>
        <td style="color:#a0c4ff">${efgVal!=null?(efgVal*100).toFixed(0)+'%':'–'}</td>
        <td style="color:#a0c4ff">${fmt(gmscVal)}</td>
      </tr>`;
    }).join('');

    const teamLink = TEAMS_DATA[teamName]
      ? `<a href="#/team/${encodeURIComponent(teamName)}">${escapeHtml(teamName)}</a>`
      : escapeHtml(teamName);

    const efgTeam = teamFgA ? ((teamFgM + 0.5*team3M)/teamFgA*100).toFixed(0)+'%' : '–';
    const totRow = `<tr style="font-weight:600;border-top:2px solid #2a3a4a">
      <td style="text-align:left">Totalt</td>
      <td></td>
      <td><strong>${teamPts}</strong></td>
      <td>${teamReb}</td><td>${teamAst}</td><td>${teamStl}</td>
      <td>${teamBlk}</td><td>${teamTov}</td><td></td>
      <td>${teamFgM}/${teamFgA}</td><td>${team3M}/${team3A}</td><td>${teamFtM}/${teamFtA}</td>
      <td></td><td style="color:#a0c4ff">${efgTeam}</td><td></td>
    </tr>`;

    return `
      <div class="section">
        <h2>${teamLink}</h2>
        <div class="card scroll-x">
          <table>
            <thead><tr>
              <th style="text-align:left;min-width:120px">Spelare</th>
              <th>Min</th><th>PTS</th><th>REB</th><th>AST</th>
              <th>STL</th><th>BLK</th><th>TOV</th>
              <th title="Offensiva fouls">OF</th>
              <th>FG</th><th>3P</th><th>FT</th><th>+/-</th>
              <th title="Effective Field Goal%">eFG%</th>
              <th title="Game Score">GmSc</th>
            </tr></thead>
            <tbody>${bodyRows}${totRow}</tbody>
          </table>
        </div>
      </div>`;
  }

  const score = (m.hs != null && m.as != null) ? `${m.hs} – ${m.as}` : '';
  const dateStr = m.date_parsed || m.date || '';

  let html = `<div style="margin-bottom:16px">${backLink()}</div>
    <div class="card">
      <div style="font-size:13px;color:#9aa3b2;margin-bottom:4px">${escapeHtml(dateStr)} · ${escapeHtml(fmtSeason(m.year))}</div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="font-size:18px;font-weight:700">
          <a href="#/team/${encodeURIComponent(m.home)}">${escapeHtml(m.home)}</a>
        </div>
        <div style="font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:#e8edf4">${score}</div>
        <div style="font-size:18px;font-weight:700">
          <a href="#/team/${encodeURIComponent(m.away)}">${escapeHtml(m.away)}</a>
        </div>
      </div>
    </div>`;

  html += boxTable(homeRows, m.home);
  html += boxTable(awayRows, m.away);

  $main.innerHTML = html;
  window.scrollTo(0, 0);
}

function renderRecordsPage() {
  const allYears = DATA.matches.map(m => m.year).filter(Boolean);
  const currentYear = Math.max(...allYears);

  // Lagdag-totaler per match
  const teamMatchAgg = {};
  for (const r of DATA.stats) {
    const mid = get(r, 'match_id'), team = get(r, 'team_name');
    if (!mid || !team) continue;
    const k = team + '\0' + mid;
    if (!teamMatchAgg[k]) {
      const m = MATCHES_BY_ID[mid];
      teamMatchAgg[k] = {team, matchId: mid, year: m ? m.year : null,
        pts:0, reb:0, ast:0, stl:0, blk:0, tov:0, fg3:0};
    }
    const a = teamMatchAgg[k];
    a.pts += get(r,'points')    || 0;
    a.reb += (get(r,'rebounds_def')||0) + (get(r,'rebounds_off')||0);
    a.ast += get(r,'assists')   || 0;
    a.stl += get(r,'steals')    || 0;
    a.blk += get(r,'blocks')    || 0;
    a.tov += get(r,'turnovers') || 0;
    a.fg3 += get(r,'three_made')|| 0;
  }
  const teamGames = Object.values(teamMatchAgg);
  for (const tg of teamGames) {
    const m = MATCHES_BY_ID[tg.matchId];
    tg.opp = m ? (tg.team === m.home ? m.away : m.home) : '';
  }

  // Spelarsnitt per säsong (minst 3 matcher)
  function playerSeasonStats(filterYear) {
    const byPS = {};
    for (const r of DATA.stats) {
      const m = MATCHES_BY_ID[get(r,'match_id')];
      if (!m || (filterYear && m.year !== filterYear)) continue;
      const k = get(r,'player_key') + '\0' + m.year;
      if (!byPS[k]) byPS[k] = {pkey: get(r,'player_key'), team: get(r,'team_name'), year: m.year, rows: []};
      byPS[k].rows.push(r);
    }
    return Object.values(byPS).filter(s => s.rows.length >= 3).map(s => {
      const rebs = s.rows.map(r => (get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0));
      return {
        pkey: s.pkey, team: s.team, year: s.year, games: s.rows.length,
        pts: avg(s.rows,'points'),
        reb: rebs.reduce((a,b)=>a+b,0)/rebs.length,
        ast: avg(s.rows,'assists'),
        stl: avg(s.rows,'steals'),
        blk: avg(s.rows,'blocks'),
        fg3: avg(s.rows,'three_made'),
      };
    });
  }

  // Lagsnitt per säsong (minst 5 matcher)
  function teamSeasonStats(filterYear) {
    const byTS = {};
    for (const tg of teamGames) {
      if (!tg.year || (filterYear && tg.year !== filterYear)) continue;
      const k = tg.team + '\0' + tg.year;
      if (!byTS[k]) byTS[k] = {team: tg.team, year: tg.year, games:0, pts:0,reb:0,ast:0,stl:0,blk:0,tov:0,fg3:0};
      const s = byTS[k]; s.games++;
      for (const f of ['pts','reb','ast','stl','blk','tov','fg3']) s[f] += tg[f];
    }
    return Object.values(byTS).filter(s => s.games >= 5).map(s => ({
      ...s,
      pts: s.pts/s.games, reb: s.reb/s.games, ast: s.ast/s.games,
      stl: s.stl/s.games, blk: s.blk/s.games, tov: s.tov/s.games, fg3: s.fg3/s.games,
    }));
  }

  function topN(arr, field, n=5) {
    return arr.filter(x => x[field] > 0).sort((a,b) => b[field]-a[field]).slice(0,n);
  }

  function pName(pkey) {
    const p = PLAYERS_BY_KEY[pkey];
    return p ? fullName(p) : pkey;
  }

  function extractVal(r, cat) {
    if (cat === 'reb') return (get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0);
    if (cat === 'fg3') return get(r,'three_made') || 0;
    return get(r, cat) || 0;
  }

  // --- Renderfunktioner ---

  function miniTable(title, rows) {
    if (!rows.length) return '';
    return `
      <div style="min-width:0">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6c7a8c;margin-bottom:8px">${title}</div>
        <table style="table-layout:fixed;width:100%;border-collapse:collapse">
          <tbody>${rows.join('')}</tbody>
        </table>
      </div>`;
  }

  function recordGrid(tables) {
    const valid = tables.filter(Boolean);
    if (!valid.length) return '';
    return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px">${valid.join('')}</div>`;
  }

  // Rad för spelarsnitt
  function playerAvgTable(data, cat, title, showYear) {
    const rows = topN(data, cat).map((r,i) => {
      const yearBadge = showYear && r.year
        ? `<span style="font-size:10px;color:#6c7a8c;margin-left:4px">${fmtSeason(r.year)}</span>`
        : '';
      return `<tr>
        <td style="width:20px;padding:5px 6px 5px 0;color:#6c7a8c;font-size:12px;text-align:left">${i+1}</td>
        <td style="padding:5px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0">
          <a href="#/player/${encodeURIComponent(r.pkey)}" style="font-size:13px">${escapeHtml(pName(r.pkey))}</a>${yearBadge}</td>
        <td style="padding:5px 0 5px 6px;text-align:right;font-weight:700;font-size:14px;width:36px;white-space:nowrap">${r[cat].toFixed(1)}</td>
      </tr>`;
    });
    return miniTable(title, rows);
  }

  // Rad för spelarrekord enskild match
  function playerGameTable(statsArr, cat, title, showYear) {
    const mapped = statsArr.map(r => {
      const val = extractVal(r, cat);
      const mid = get(r,'match_id');
      const m = MATCHES_BY_ID[mid];
      const opp = m ? (get(r,'team_name')===m.home ? m.away : m.home) : '';
      return {pkey: get(r,'player_key'), val, opp, year: m ? m.year : null};
    }).filter(x => x.val > 0);
    const rows = topN(mapped, 'val').map((r,i) => {
      const context = showYear && r.year
        ? `${escapeHtml(r.opp)} <span style="color:#6c7a8c">${fmtSeason(r.year)}</span>`
        : escapeHtml(r.opp);
      return `<tr>
        <td style="width:20px;padding:5px 6px 5px 0;color:#6c7a8c;font-size:12px;text-align:left">${i+1}</td>
        <td style="padding:5px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0">
          <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            <a href="#/player/${encodeURIComponent(r.pkey)}">${escapeHtml(pName(r.pkey))}</a></div>
          <div style="font-size:11px;color:#9aa3b2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">mot ${context}</div>
        </td>
        <td style="padding:5px 0 5px 6px;text-align:right;font-weight:700;font-size:14px;width:36px;white-space:nowrap">${r.val}</td>
      </tr>`;
    });
    return miniTable(title, rows);
  }

  // Rad för lagsnitt per säsong
  function teamAvgTable(data, cat, title) {
    const rows = topN(data, cat).map((r,i) => `<tr>
      <td style="width:20px;padding:5px 6px 5px 0;color:#6c7a8c;font-size:12px;text-align:left">${i+1}</td>
      <td style="padding:5px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0">
        <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <a href="#/team/${encodeURIComponent(r.team)}">${escapeHtml(r.team)}</a></div>
        <div style="font-size:11px;color:#9aa3b2">${fmtSeason(r.year)}</div>
      </td>
      <td style="padding:5px 0 5px 6px;text-align:right;font-weight:700;font-size:14px;width:36px;white-space:nowrap">${r[cat].toFixed(1)}</td>
    </tr>`);
    return miniTable(title, rows);
  }

  // Rad för lagrekord enskild match
  function teamGameTable(data, cat, title, showYear) {
    const rows = topN(data, cat).map((r,i) => {
      const context = showYear && r.year
        ? `${escapeHtml(r.opp)} <span style="color:#6c7a8c">${fmtSeason(r.year)}</span>`
        : escapeHtml(r.opp);
      return `<tr>
        <td style="width:20px;padding:5px 6px 5px 0;color:#6c7a8c;font-size:12px;text-align:left">${i+1}</td>
        <td style="padding:5px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0">
          <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            <a href="#/team/${encodeURIComponent(r.team)}">${escapeHtml(r.team)}</a></div>
          <div style="font-size:11px;color:#9aa3b2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">mot ${context}</div>
        </td>
        <td style="padding:5px 0 5px 6px;text-align:right;font-weight:700;font-size:14px;width:36px;white-space:nowrap">${r[cat]}</td>
      </tr>`;
    });
    return miniTable(title, rows);
  }

  // --- Data ---
  const psNow      = playerSeasonStats(currentYear);
  const psAll      = playerSeasonStats(null);
  const tsAll      = teamSeasonStats(null);
  const curStats   = DATA.stats.filter(r => { const m = MATCHES_BY_ID[get(r,'match_id')]; return m && m.year === currentYear; });
  const curTeamGames = teamGames.filter(tg => tg.year === currentYear);
  const CATS  = ['pts','reb','ast','stl','blk','fg3'];
  const TCATS = ['pts','reb','ast','stl','blk'];
  const LABELS = {pts:'Poäng', reb:'Returer', ast:'Assists', stl:'Steals', blk:'Blocks', fg3:'Trepoängare'};

  // --- Tab-bar ---
  const isCurrent = recordsTab === 'current';
  const tabStyle = active => `cursor:pointer;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:600;border:none;` +
    (active ? 'background:#1a3a5c;color:#e8edf4;' : 'background:transparent;color:#9aa3b2;');

  let html = `
    <div style="margin-bottom:16px">${backLink()}</div>
    <div style="margin-bottom:24px">
      <h1 style="margin:0 0 16px">Rekordbok</h1>
      <div style="display:flex;gap:4px;background:#161f2e;border-radius:20px;padding:4px;width:fit-content">
        <button style="${tabStyle(isCurrent)}" onclick="recordsTab='current';renderRecordsPage()">Säsong ${fmtSeason(currentYear)}</button>
        <button style="${tabStyle(!isCurrent)}" onclick="recordsTab='alltime';renderRecordsPage()">Alla tider</button>
      </div>
    </div>`;

  if (isCurrent) {
    html += `
      <div class="section">
        <h2>Individuellt — säsongssnitt</h2>
        <div class="card">${recordGrid(CATS.map(c => playerAvgTable(psNow, c, LABELS[c]+'/match', false)))}</div>
      </div>
      <div class="section">
        <h2>Individuellt — bästa match</h2>
        <div class="card">${recordGrid(CATS.map(c => playerGameTable(curStats, c, LABELS[c], false)))}</div>
      </div>
      <div class="section">
        <h2>Lag — bästa match</h2>
        <div class="card">${recordGrid(TCATS.map(c => teamGameTable(curTeamGames, c, LABELS[c], false)))}</div>
      </div>`;
  } else {
    html += `
      <div class="section">
        <h2>Individuellt — bäst säsongssnitt</h2>
        <div class="card">${recordGrid(CATS.map(c => playerAvgTable(psAll, c, LABELS[c]+'/match', true)))}</div>
      </div>
      <div class="section">
        <h2>Individuellt — bästa match</h2>
        <div class="card">${recordGrid(CATS.map(c => playerGameTable(DATA.stats, c, LABELS[c], true)))}</div>
      </div>
      <div class="section">
        <h2>Lag — bäst säsongssnitt</h2>
        <div class="card">${recordGrid(TCATS.map(c => teamAvgTable(tsAll, c, LABELS[c]+'/match')))}</div>
      </div>
      <div class="section">
        <h2>Lag — bästa match</h2>
        <div class="card">${recordGrid(TCATS.map(c => teamGameTable(teamGames, c, LABELS[c], true)))}</div>
      </div>`;
  }

  $main.innerHTML = html;
  window.scrollTo(0, 0);
}

function filterTeamPage(year) {
  _tSeason = year;
  document.querySelectorAll('.t-season-btn').forEach(btn => {
    const active = year === null ? btn.dataset.year === 'all' : Number(btn.dataset.year) === year;
    btn.style.background = active ? '#1a3a5c' : 'transparent';
    btn.style.color      = active ? '#e8edf4'  : '#9aa3b2';
  });
  // Markera vald rad i säsongsrekord-tabellen
  document.querySelectorAll('#season-record-body tr').forEach(tr => {
    tr.style.background = (year && tr.dataset.year === String(year)) ? '#0d1f35' : '';
  });
  // Uppdatera ledaravsnittet
  const div = document.getElementById('team-leaders');
  if (div) div.innerHTML = renderTeamSeasonLeaders(_tName, _tSeason);
}

function renderTeamPage(teamName) {
  if (teamName !== _tName) _tSeason = null;
  _tName = teamName;
  const td = TEAMS_DATA[teamName];
  if (!td) {
    $main.innerHTML = `<div class="empty"><p>Laget finns inte.</p><p><a href="#">← Tillbaka</a></p></div>`;
    return;
  }

  // Finals history for this team
  const finalsAppearances = FINALS.filter(f =>
    (f.champion === teamName || f.finalist === teamName) && !f.aborted
  ).sort((a, b) => b.year - a.year);
  const championships = finalsAppearances.filter(f => f.champion === teamName);

  // Header badges
  let badgeHtml = '';
  if (championships.length) badgeHtml += `<span style="font-size:14px;background:#2a2200;color:#ffc53d;border:1px solid #5a4400;border-radius:6px;padding:3px 10px;margin-right:8px">🏆 ${championships.length} SM-guld</span>`;
  if (finalsAppearances.length > championships.length) {
    const ruCount = finalsAppearances.length - championships.length;
    badgeHtml += `<span style="font-size:14px;background:#1a1f2a;color:#9aa3b2;border:1px solid #2a2f3a;border-radius:6px;padding:3px 10px">🥈 ${ruCount} finalist${ruCount > 1 ? 'er' : ''}</span>`;
  }

  let html = `
    <div style="margin-bottom:10px">${backLink()}</div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-size:48px;line-height:1">🏀</div>
        <div>
          <div class="player-name">${escapeHtml(teamName)}</div>
          <div class="player-meta" style="margin-top:8px">${badgeHtml}</div>
        </div>
      </div>
    </div>`;

  // SM-historia section
  if (finalsAppearances.length) {
    const finRows = finalsAppearances.map(f => {
      const role = f.champion === teamName ? '<span style="color:#ffc53d">🏆 SM-guld</span>' : '<span class="muted">🥈 Finalist</span>';
      const opp = f.champion === teamName ? f.finalist : f.champion;
      return `<tr class="match"><td>${f.year}</td><td>${role}</td><td>${escapeHtml(opp)}</td></tr>`;
    }).join('');
    html += `
      <div class="section">
        <h2>SM-historia</h2>
        <div class="card scroll-x">
          <table>
            <thead><tr><th>År</th><th>Roll</th><th>Mot</th></tr></thead>
            <tbody>${finRows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // Season records table
  const seasonRows = td.seasons.map(s => {
    const ppFor = s.games ? (s.ptsFor / s.games).toFixed(1) : '–';
    const ppAgainst = s.games ? (s.ptsAgainst / s.games).toFixed(1) : '–';
    const isActive = _tSeason === s.year;
    return `
      <tr class="match" data-year="${s.year}" style="${isActive ? 'background:#0d1f35;' : ''}cursor:pointer" onclick="filterTeamPage(${s.year})">
        <td>${fmtSeason(s.year)}</td>
        <td>${s.wins}–${s.losses}</td>
        <td>${ppFor}</td>
        <td>${ppAgainst}</td>
        <td class="muted">${s.games}</td>
      </tr>`;
  }).join('');
  html += `
    <div class="section">
      <h2>Säsongsrekord</h2>
      <div class="card scroll-x">
        <table>
          <thead><tr><th>Säsong</th><th>V–F</th><th>Pts/m (för)</th><th>Pts/m (mot)</th><th>Matcher</th></tr></thead>
          <tbody id="season-record-body">${seasonRows}</tbody>
        </table>
      </div>
    </div>`;

  // Säsongsfilter-knappar + ligaledare
  const seasons = td.seasons.map(s => s.year);
  const btnStyle = active =>
    `cursor:pointer;padding:5px 12px;border-radius:14px;font-size:13px;font-weight:600;border:none;` +
    (active ? 'background:#1a3a5c;color:#e8edf4;' : 'background:transparent;color:#9aa3b2;');

  const seasonBtns = seasons.map(y =>
    `<button class="t-season-btn" data-year="${y}" style="${btnStyle(_tSeason===y)}" onclick="filterTeamPage(${y})">${fmtSeason(y)}</button>`
  ).join('');

  html += `
    <div style="display:flex;gap:4px;background:#161f2e;border-radius:20px;padding:4px;width:fit-content;flex-wrap:wrap;margin:20px 0 4px">
      <button class="t-season-btn" data-year="all" style="${btnStyle(_tSeason===null)}" onclick="filterTeamPage(null)">Alla säsonger</button>
      ${seasonBtns}
    </div>
    <div id="team-leaders">${renderTeamSeasonLeaders(teamName, _tSeason)}</div>`;

  $main.innerHTML = html;
  window.scrollTo(0, 0);
}

function renderTeamSeasonLeaders(teamName, year) {
  // year === null → alla säsonger (karriärsnitt med laget)
  const teamRows = DATA.stats.filter(r => {
    const m = MATCHES_BY_ID[get(r, 'match_id')];
    return m && (year === null || m.year === year) && get(r, 'team_name') === teamName;
  });
  if (!teamRows.length) return '';

  // Group by player
  const byPlayer = {};
  for (const r of teamRows) {
    const k = get(r, 'player_key');
    if (!byPlayer[k]) byPlayer[k] = [];
    byPlayer[k].push(r);
  }

  const categories = [
    {label: 'Poäng', field: 'points'},
    {label: 'Returer', calc: r => (get(r,'rebounds_def')||0)+(get(r,'rebounds_off')||0)},
    {label: 'Assists', field: 'assists'},
    {label: 'Steals', field: 'steals'},
    {label: 'Blocks', field: 'blocks'},
  ];

  const sections = categories.map(cat => {
    const playerStats = Object.entries(byPlayer).map(([key, rows]) => {
      const val = cat.calc
        ? rows.map(cat.calc).reduce((a,b)=>a+b,0) / rows.length
        : avg(rows, cat.field);
      const p = PLAYERS_BY_KEY[key];
      const name = p ? fullName(p) : key;
      return {key, name, val, games: rows.length};
    }).filter(x => x.val != null && x.val > 0)
      .sort((a, b) => b.val - a.val)
      .slice(0, 5);

    if (!playerStats.length) return '';
    const rows = playerStats.map((x, i) => {
      const rank = i + 1;
      return `<tr class="match">
        <td class="muted" style="width:20px;padding-right:4px">${rank}</td>
        <td style="padding-right:10px"><a href="#/player/${encodeURIComponent(x.key)}" style="word-break:break-word">${escapeHtml(x.name)}</a></td>
        <td style="width:36px">${x.val.toFixed(1)}</td>
        <td class="muted" style="width:28px">${x.games}</td>
      </tr>`;
    }).join('');
    return `
      <div style="min-width:0">
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#9aa3b2;margin-bottom:6px">${cat.label}/match</div>
        <table style="table-layout:fixed;width:100%"><thead><tr>
          <th style="width:20px;padding-right:4px">#</th>
          <th style="text-align:left">Spelare</th>
          <th style="width:36px">Snitt</th>
          <th style="width:28px">M</th>
        </tr></thead>
        <tbody>${rows}</tbody></table>
      </div>`;
  }).filter(Boolean).join('');

  if (!sections) return '';
  const heading = year === null ? 'Alla säsonger — snitt med laget' : `Säsong ${fmtSeason(year)} — ligaledare`;
  return `
    <div class="section">
      <h2>${heading}</h2>
      <div class="card">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;overflow:hidden">
          ${sections}
        </div>
      </div>
    </div>`;
}

// Sorterbar kolumnrubrik för spelmatchlogg
function _glTh(col, label, title) {
  const active = _glSort.col === col;
  const ind = active ? (_glSort.dir < 0 ? ' ▼' : ' ▲') : '';
  const color = active ? ';color:#cce5ff' : '';
  const tt = title ? ` title="${title}"` : '';
  return `<th onclick="glSort('${col}')" style="cursor:pointer;user-select:none${color}"${tt}>${label}${ind}</th>`;
}

function glSort(col) {
  _glSort.dir = _glSort.col === col ? -_glSort.dir : -1;
  _glSort.col = col;
  const tb = document.getElementById('gl-body');
  if (tb) tb.innerHTML = buildGlRows(STATS_BY_PLAYER[_pKey] || []);
}

function buildGlRows(allRows) {
  let rows = allRows.slice();
  const {col, dir} = _glSort;
  if (col) {
    rows.sort((a, b) => {
      let av, bv;
      if (col === 'reb') {
        av = (get(a,'rebounds_def')||0)+(get(a,'rebounds_off')||0);
        bv = (get(b,'rebounds_def')||0)+(get(b,'rebounds_off')||0);
      } else if (col === 'gmsc') {
        av = gmsc(a); bv = gmsc(b);
      } else if (col === 'date') {
        const ma = MATCHES_BY_ID[get(a,'match_id')], mb = MATCHES_BY_ID[get(b,'match_id')];
        av = ma ? (ma.date_parsed||'') : '';
        bv = mb ? (mb.date_parsed||'') : '';
        return dir * av.localeCompare(bv);
      } else {
        av = get(a, col);
        bv = get(b, col);
      }
      if (av == null && bv == null) return 0;
      if (av == null) return 1;   // nulls alltid sist
      if (bv == null) return -1;
      return dir * (av - bv);
    });
  }
  return rows.map(r => {
    const m = MATCHES_BY_ID[get(r, 'match_id')];
    if (!m) return '';
    const mid = get(r, 'match_id');
    const team = get(r, 'team_name') || '';
    const ownIsHome = team && team === m.home;
    const opp = ownIsHome ? m.away : m.home;
    const score = (m.hs != null && m.as != null) ? `${m.hs}–${m.as}` : '';
    const reb = (get(r,'rebounds_def')||0) + (get(r,'rebounds_off')||0);
    const result = score ? `${score} mot ${escapeHtml(opp || '')}` : escapeHtml(opp || '');
    const pkey = get(r, 'player_key');
    const pf = getPbpFouls(pkey, mid);
    const offFoul = pf ? pf[0] : 0;
    const techFoul = pf ? (pf[1] + pf[2]) : 0;
    const ofCell = offFoul ? `<td style="color:#ff8b8b">${offFoul}</td>` : '<td class="muted">0</td>';
    const tfCell = techFoul ? `<td style="color:#ff8b8b">${techFoul}</td>` : '<td class="muted">0</td>';
    // Markera rad som innehåller karriärbäst/säsongsbäst
    const isBest = Object.values(_pBests).some(b => b.matchId === mid);
    const rowStyle = isBest ? ' style="background:#1a1600"' : '';
    const starCell = isBest ? '<td style="color:#ffd700;width:16px" title="Karriärbäst">★</td>' : '<td style="width:16px"></td>';
    return `
      <tr class="match"${rowStyle}>
        ${starCell}
        <td><a href="#/match/${mid}" style="color:inherit">${escapeHtml(m.date || '')}</a></td>
        <td class="muted">${result}</td>
        <td>${escapeHtml(get(r,'minutes') || '')}</td>
        <td>${fmtInt(get(r,'points'))}</td>
        <td>${fmtInt(reb)}</td>
        <td>${fmtInt(get(r,'assists'))}</td>
        <td>${fmtInt(get(r,'steals'))}</td>
        <td>${fmtInt(get(r,'blocks'))}</td>
        <td>${fmtInt(get(r,'turnovers'))}</td>
        ${ofCell}
        ${tfCell}
        <td>${fmtInt(get(r,'fg_made'))}/${fmtInt(get(r,'fg_att'))}</td>
        <td>${fmtInt(get(r,'three_made'))}/${fmtInt(get(r,'three_att'))}</td>
        <td>${fmtInt(get(r,'ft_made'))}/${fmtInt(get(r,'ft_att'))}</td>
        <td>${fmtInt(get(r,'plus_minus'))}</td>
        <td style="color:#a0c4ff">${fmt(gmsc(r))}</td>
      </tr>`;
  }).join('');
}

function renderGameLog(allRows) {
  if (!allRows.length) return '';
  return `
    <div class="section">
      <h2>Matcher (${allRows.length})</h2>
      <div class="card scroll-x">
        <table>
          <thead><tr>
            <th style="width:16px"></th>
            ${_glTh('date','Datum')}
            <th style="text-align:left">Match</th>
            <th>Min</th>
            ${_glTh('points','PTS')}
            ${_glTh('reb','REB')}
            ${_glTh('assists','AST')}
            ${_glTh('steals','STL')}
            ${_glTh('blocks','BLK')}
            ${_glTh('turnovers','TOV')}
            <th title="Offensiva fouls">OF</th>
            <th title="Tekniska/osportsliga fouls">TF</th>
            <th>FG</th><th>3P</th><th>FT</th>
            ${_glTh('plus_minus','+/-')}
            ${_glTh('gmsc','GmSc','Game Score')}
          </tr></thead>
          <tbody id="gl-body">${buildGlRows(allRows)}</tbody>
        </table>
      </div>
    </div>`;
}

// =============================================================================
// Sökrutans event
// =============================================================================

let searchTimer = null;
$search.addEventListener('input', () => {
  // Om vi är på en spelare-, lag- eller jämförelsesida, gå tillbaka till sök vid första bokstaven
  const onSubpage = location.hash.startsWith('#/player/') || location.hash.startsWith('#/team/') || location.hash.startsWith('#/compare/') || location.hash.startsWith('#/match/');
  if (onSubpage && $search.value.trim()) {
    lastSearch = '';
    location.hash = '';
    return;
  }
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (DATA) {
      lastSearch = $search.value;
      renderSearchPage($search.value);
    }
  }, 80);
});

// "/" hoppar fokus till sökrutan (snabbsök under livesändning)
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== $search) {
    e.preventDefault();
    $search.focus();
    $search.select();
  }
});

// Håll CSS-variabeln --hdr synkad med faktisk headerbredd
(function syncHdr() {
  const hdr = document.querySelector('header.site');
  if (!hdr) return;
  const update = () => document.documentElement.style.setProperty('--hdr', hdr.offsetHeight + 'px');
  update();
  new ResizeObserver(update).observe(hdr);
})();

// =============================================================================
// Start
// =============================================================================

load();
</script>
